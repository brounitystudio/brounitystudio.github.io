<!doctype html>
<html lang="tr">
<head>

  <meta name="robots" content="index, follow">

  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #f7faf9;

    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      width: min(720px, 100%);

      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin: 0 0 14px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(36px, 8vw, 72px);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 18px;
      max-width: 620px;
      color: #3c4c47;
      font-size: 18px;
      line-height: 1.65;
    }

    a {
      color: #0d6b4c;
      font-weight: 700;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 1px solid #0d6b4c;
      border-radius: 6px;
      color: #ffffff;
      background: #0d6b4c;
      text-decoration: none;
    }

    .text-link {
      display: inline-flex;
      align-items: center;
      min-height: 44px;
    }

    <p>Bu sayfa DUAMATIK uygulamasinin resmi web adresidir.</p>
    <div class="links">
      <a class="button" href="https://play.google.com/store/apps/details?id=com.brounitystudio.duamatik">Google Play'de ac</a>
      <a class="text-link" href="/app-ads.txt">app-ads.txt</a>
